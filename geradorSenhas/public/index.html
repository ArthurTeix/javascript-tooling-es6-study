<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Gerador de Senhas</title>
</head>

<body>

  <section class="container">
    <h2>Requisitos da Senha</h2>

    <p>Quantidade de caracteres: <input type="number" class="quant-senha" value="8" min="1" max="20"></p>
    
    <br>

    <p>Números?<input type="checkbox" class="chk-numeros" checked></p>
    <p>Letras maiúsculas?<input type="checkbox" class="chk-maiusculas"></p>
    <p>Letras minúsculas?<input type="checkbox" class="chk-minusculas"></p>
    <p>Símbolos?<input type="checkbox" class="chk-simbolos"></p>

    <button class="gera-senha">Gerar Senha</button>
    <hr>

    <h2>Senha Gerada:</h2>
    <div class="senha-gerada">Selecione as Opções</div>
  </section>

  <script src="./assets/js/bundle.js"></script>
</body>

</html>
